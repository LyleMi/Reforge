<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reforge report app</title>
  </head>
  <body>
    <script id="reforge-report-data" type="application/json">
      {
        "schema_version": 17,
        "summary": {
          "scanned_files": 0,
          "finding_count": 0,
          "hotspot_count": 0,
          "similar_function_group_count": 0,
          "duration_ms": 0,
          "hotspot_model": "hybrid",
          "churn": {
            "mode": "auto",
            "enabled": false,
            "status": "unavailable",
            "reason": "development fixture has no git history",
            "window_days": 180,
            "max_commit_lines": 2000
          }
        },
        "stats": {
          "source_files_scanned": 0,
          "directories_scanned": 0,
          "function_candidates": 0
        },
        "metrics_summary": { "files": {}, "functions": {}, "types": {}, "churn": {} },
        "raw_metrics": { "files": [], "functions": [], "types": [] },
        "dependency_graph": { "nodes": [], "edges": [] },
        "hotspots": [],
        "suppression_summary": {
          "suppressed_count": 0,
          "suppressed_by_kind": {},
          "suppressed_by_severity": {},
          "highest_suppressed_priority": null
        },
        "findings": []
      }
    </script>
    <div id="reforge-report-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
