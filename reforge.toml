churn = "auto"
max-file-lines = 600
ignore-paths = [
  "assets/report-app.js",
  "web/report-app/src/vite-env.d.ts",
]

[[suppressions]]
kind = "dependency_hub"
path = "src/main.rs"
reason = "The binary crate root intentionally wires the CLI, scan, workflow, and output ownership boundaries."

[[suppressions]]
kind = "dependency_hub"
path = "src/detectors/similarity.rs"
reason = "The similarity facade intentionally coordinates language parsing, token extraction, lossless indexing, exact comparison, and detector reporting modules."
